<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g-blue:   #4285F4;
      --g-red:    #EA4335;
      --g-yellow: #FBBC05;
      --g-green:  #34A853;
      --text:     #202124;
      --muted:    #5f6368;
      --border:   #e0e0e0;
      --hover:    #f1f3f4;
      --link:     #1a73e8;
    }

    body {
      font-family: Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       SIMULATED GOOGLE HOMEPAGE BACKGROUND
    ───────────────────────────────────────── */
    .g-page {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    /* Top-right navigation bar */
    .g-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 8px 14px;
      gap: 4px;
      flex-shrink: 0;
    }

    .g-nav-link {
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 4px;
      line-height: 20px;
      white-space: nowrap;
    }
    .g-nav-link:hover { background: var(--hover); }

    .g-nav-sep {
      width: 1px;
      height: 16px;
      background: #dadce0;
      margin: 0 6px;
      flex-shrink: 0;
    }

    .g-icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .g-icon-btn:hover { background: var(--hover); }

    .g-avatar-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--link);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
      flex-shrink: 0;
      font-family: inherit;
    }

    /* Centered page content */
    .g-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 100px;
      gap: 26px;
    }

    .g-logo {
      font-size: 92px;
      font-weight: 400;
      letter-spacing: -2px;
      line-height: 1;
      user-select: none;
    }

    .c-b { color: var(--g-blue); }
    .c-r { color: var(--g-red); }
    .c-y { color: var(--g-yellow); }
    .c-g { color: var(--g-green); }

    .g-search-box {
      display: flex;
      align-items: center;
      width: 544px;
      max-width: calc(100vw - 32px);
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 11px 14px;
      gap: 10px;
      background: #fff;
      cursor: text;
      transition: box-shadow 0.1s, border-color 0.1s;
    }
    .g-search-box:hover {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: transparent;
    }
    .g-search-box input {
      border: none;
      outline: none;
      flex: 1;
      font-size: 16px;
      color: var(--text);
      background: transparent;
      font-family: inherit;
      min-width: 0;
    }
    .g-search-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .g-search-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .g-btns {
      display: flex;
      gap: 12px;
    }
    .g-btn {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      padding: 9px 20px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .g-btn:hover {
      border-color: var(--border);
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    /* ─────────────────────────────────────────
       ACCOUNT MENU POPUP
    ───────────────────────────────────────── */
    .mc-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
    }
    .mc-overlay.hidden { display: none; }

    .mc {
      position: absolute;
      top: 60px;
      right: 8px;
      width: 360px;
      background: #fff;
      border-radius: 28px;
      box-shadow:
        0 1px 2px rgba(60,64,67,.3),
        0 2px 6px 2px rgba(60,64,67,.15);
      overflow: hidden;
      animation: mc-appear 0.2s cubic-bezier(0.2,0,0,1.2);
      transform-origin: top right;
      font-family: Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    @keyframes mc-appear {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Card header ── */
    .mc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 8px 10px 20px;
    }
    .mc-wordmark {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.3px;
      line-height: 1;
      user-select: none;
    }
    .mc-close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .mc-close-btn:hover { background: var(--hover); }

    /* ── Primary account ── */
    .mc-primary {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2px 24px 22px;
    }
    .mc-avatar-lg {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--link);
      color: #fff;
      font-size: 30px;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      flex-shrink: 0;
      user-select: none;
    }
    .mc-pname {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      text-align: center;
      line-height: 24px;
    }
    .mc-pemail {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      text-align: center;
      line-height: 20px;
    }
    .mc-manage-btn {
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--link);
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      line-height: 20px;
      transition: background 0.1s, border-color 0.1s;
    }
    .mc-manage-btn:hover { background: #e8f0fe; border-color: #c6d8fc; }

    /* ── Divider ── */
    .mc-hr { height: 1px; background: var(--border); }

    /* ── Account list ── */
    .mc-accts { padding: 4px 0; }

    .mc-acct-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 16px;
      cursor: pointer;
      min-height: 56px;
      transition: background 0.1s;
    }
    .mc-acct-row:hover { background: var(--hover); }

    .mc-avatar-sm {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #fff;
      font-size: 17px;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      user-select: none;
    }
    .av-blue   { background: #1a73e8; }
    .av-green  { background: #1e8e3e; }
    .av-red    { background: #d93025; }
    .av-purple { background: #9334e6; }

    .mc-acct-info { flex: 1; min-width: 0; }
    .mc-acct-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mc-acct-email {
      font-size: 13px;
      color: var(--muted);
      line-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mc-check { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Action rows ── */
    .mc-actions { padding: 4px 0; }
    .mc-action {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 16px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .mc-action:hover { background: var(--hover); }
    .mc-action-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mc-action-label {
      font-size: 14px;
      color: var(--text);
      line-height: 20px;
    }

    /* ── Footer ── */
    .mc-foot {
      padding: 14px 16px 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 18px;
    }
    .mc-foot a { color: var(--muted); text-decoration: none; }
    .mc-foot a:hover { text-decoration: underline; }
    .mc-foot-sep { margin: 0 4px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════
     SIMULATED GOOGLE HOMEPAGE
═══════════════════════════════ -->
<div class="g-page">

  <!-- Top-right nav -->
  <nav class="g-nav" aria-label="Site navigation">
    <a class="g-nav-link" href="#">Gmail</a>
    <a class="g-nav-link" href="#">Images</a>

    <!-- Apps / waffle icon -->
    <button class="g-icon-btn" aria-label="Google apps">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#5f6368">
        <path d="M6 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 14c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 20c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
      </svg>
    </button>

    <!-- Account avatar button — click to toggle menu -->
    <button class="g-avatar-btn" aria-label="Google Account: Jane Doe" onclick="openMenu()">J</button>
  </nav>

  <!-- Center body -->
  <div class="g-body">
    <div class="g-logo" aria-label="Google">
      <span class="c-b">G</span><span class="c-r">o</span><span class="c-y">o</span><span class="c-b">g</span><span class="c-g">l</span><span class="c-r">e</span>
    </div>

    <div class="g-search-box" role="search">
      <!-- Search magnifying glass -->
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6" aria-hidden="true">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>

      <input type="text" aria-label="Search" placeholder="Search Google or type a URL" />

      <div class="g-search-icons">
        <!-- Voice search -->
        <button class="g-search-icon-btn" aria-label="Search by voice">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#4285f4">
            <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
          </svg>
        </button>
        <!-- Google Lens -->
        <button class="g-search-icon-btn" aria-label="Search by image">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <path d="M9 2H4C2.9 2 2 2.9 2 4v5h2V4h5V2zm11 2c0-1.1-.9-2-2-2h-5v2h5v5h2V4zM4 20h5v2H4c-1.1 0-2-.9-2-2v-5h2v5zm16-5v5h-5v2h5c1.1 0 2-.9 2-2v-5h-2z" fill="#4285f4"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="g-btns">
      <button class="g-btn">Google Search</button>
      <button class="g-btn">I'm Feeling Lucky</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════
     GOOGLE ACCOUNT MENU POPUP
═══════════════════════════════ -->
<div class="mc-overlay hidden" id="mcOverlay" onclick="handleOverlayClick(event)" role="dialog" aria-modal="true" aria-label="Google Account">
  <div class="mc" id="mcCard">

    <!-- Header: Google wordmark + close -->
    <div class="mc-head">
      <div class="mc-wordmark" aria-hidden="true">
        <span class="c-b">G</span><span class="c-r">o</span><span class="c-y">o</span><span class="c-b">g</span><span class="c-g">l</span><span class="c-r">e</span>
      </div>
      <button class="mc-close-btn" onclick="closeMenu()" aria-label="Close menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#5f6368">
          <path d="M18.3 5.71a.996.996 0 0 0-1.41 0L12 10.59 7.11 5.7A.996.996 0 1 0 5.7 7.11L10.59 12 5.7 16.89a.996.996 0 1 0 1.41 1.41L12 13.41l4.89 4.89a.996.996 0 1 0 1.41-1.41L13.41 12l4.89-4.89c.38-.38.38-1.02 0-1.4z"/>
        </svg>
      </button>
    </div>

    <!-- Primary / active account -->
    <div class="mc-primary">
      <div class="mc-avatar-lg" aria-hidden="true">J</div>
      <div class="mc-pname">Jane Doe</div>
      <div class="mc-pemail">janedoe@gmail.com</div>
      <button class="mc-manage-btn">Manage your Google Account</button>
    </div>

    <div class="mc-hr" role="separator"></div>

    <!-- All signed-in accounts -->
    <div class="mc-accts" role="list">

      <!-- Active account row (has checkmark) -->
      <div class="mc-acct-row" role="listitem" tabindex="0">
        <div class="mc-avatar-sm av-blue" aria-hidden="true">J</div>
        <div class="mc-acct-info">
          <div class="mc-acct-name">Jane Doe</div>
          <div class="mc-acct-email">janedoe@gmail.com</div>
        </div>
        <!-- Checkmark: indicates currently active account -->
        <svg class="mc-check" viewBox="0 0 24 24" fill="#1a73e8" aria-label="Currently active">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>

      <!-- Second account row -->
      <div class="mc-acct-row" role="listitem" tabindex="0">
        <div class="mc-avatar-sm av-green" aria-hidden="true">J</div>
        <div class="mc-acct-info">
          <div class="mc-acct-name">Jane (Work)</div>
          <div class="mc-acct-email">j.doe@acmecorp.com</div>
        </div>
      </div>
    </div>

    <div class="mc-hr" role="separator"></div>

    <!-- Actions -->
    <div class="mc-actions" role="list">

      <!-- Add another account -->
      <div class="mc-action" role="listitem" tabindex="0">
        <div class="mc-action-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#5f6368">
            <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
        <span class="mc-action-label">Add another account</span>
      </div>

      <!-- Sign out -->
      <div class="mc-action" role="listitem" tabindex="0">
        <div class="mc-action-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#5f6368">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
          </svg>
        </div>
        <span class="mc-action-label">Sign out of all accounts</span>
      </div>
    </div>

    <div class="mc-hr" role="separator"></div>

    <!-- Footer -->
    <div class="mc-foot">
      <a href="#">Privacy Policy</a>
      <span class="mc-foot-sep" aria-hidden="true">·</span>
      <a href="#">Terms of Service</a>
    </div>

  </div><!-- /mc -->
</div><!-- /mc-overlay -->


<script>
  const overlay = document.getElementById('mcOverlay');
  const card    = document.getElementById('mcCard');

  function openMenu() {
    overlay.classList.remove('hidden');
    // Restart entrance animation on re-open
    card.style.animation = 'none';
    void card.offsetWidth; // force reflow
    card.style.animation  = '';
  }

  function closeMenu() {
    overlay.classList.add('hidden');
  }

  function handleOverlayClick(e) {
    // Close only when the dimless overlay itself is clicked (not the card)
    if (e.target === overlay) closeMenu();
  }

  // Keyboard: Escape closes the menu
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !overlay.classList.contains('hidden')) closeMenu();
  });

  // Show the menu on page load so the replica is immediately visible
  window.addEventListener('DOMContentLoaded', openMenu);
</script>
</body>
</html>
